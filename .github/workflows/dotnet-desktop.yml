name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'FUNewsTradingSystem'
  SOLUTION_FILE: 'FUNewsTradingSystem.slnx'

jobs:
  build:
    name: Build Solution
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./${{ env.PROJECT_PATH }}

    - name: Build solution
      run: dotnet build --no-restore
      working-directory: ./${{ env.PROJECT_PATH }}

  test:
    name: Unit Tests
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./${{ env.PROJECT_PATH }}

    - name: Find test projects
      id: find-tests
      run: |
        $testProjects = Get-ChildItem -Path "./${{ env.PROJECT_PATH }}" -Filter "*Test*.csproj" -Recurse -File -ErrorAction SilentlyContinue
        if ($testProjects) {
            Write-Host "Found test projects:"
            $testProjects | ForEach-Object { Write-Host "  - $($_.FullName)" }
            "has_tests=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
            Write-Host "No test projects found, skipping tests..."
            "has_tests=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
      shell: pwsh

    - name: Run Unit Tests
      if: steps.find-tests.outputs.has_tests == 'true'
      run: dotnet test --no-restore --verbosity normal
      working-directory: ./${{ env.PROJECT_PATH }}

  analyze:
    name: Code Analysis
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./${{ env.PROJECT_PATH }}

    - name: Find rule set files
      id: find-rulesets
      run: |
        $rulesets = Get-ChildItem -Path "./${{ env.PROJECT_PATH }}" -Filter "*.ruleset" -Recurse -File -ErrorAction SilentlyContinue
        if ($rulesets) {
            Write-Host "Found rule set files:"
            $rulesets | ForEach-Object { Write-Host "  - $($_.Name)" }
            "has_ruleset=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
            Write-Host "No rule set files found, skipping analysis..."
            "has_ruleset=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
      shell: pwsh

    - name: Run Code Analysis
      if: steps.find-rulesets.outputs.has_ruleset == 'true'
      run: |
        dotnet build ./${{ env.PROJECT_PATH }}/${{ env.SOLUTION_FILE }} /p:EnforceCodeStyleInBuild=true /p:EnableNETAnalyzers=true /p:AnalysisLevel=recommended
      shell: pwsh

  security:
    name: Security Audit
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./${{ env.PROJECT_PATH }}

    - name: Check for package references
      id: check-packages
      run: |
        $csprojFiles = Get-ChildItem -Path "./${{ env.PROJECT_PATH }}" -Filter "*.csproj" -Recurse -File -ErrorAction SilentlyContinue
        if ($csprojFiles) {
            $hasPackages = $false
            foreach ($file in $csprojFiles) {
                $content = Get-Content $file.FullName -Raw -ErrorAction SilentlyContinue
                if ($content -match '<PackageReference') {
                    $hasPackages = $true
                    break
                }
            }
            if ($hasPackages) {
                Write-Host "Found package references, running security check..."
                "has_packages=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            } else {
                Write-Host "No package references found, skipping security check..."
                "has_packages=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            }
        } else {
            Write-Host "No csproj files found, skipping security check..."
            "has_packages=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
      shell: pwsh

    - name: Run dotnet-outdated
      if: steps.check-packages.outputs.has_packages == 'true'
      run: |
        dotnet tool install --global dotnet-outdated-tool 2>$null
        $PATH = $env:PATH + ";" + $env:USERPROFILE + "\.dotnet\tools"
        dotnet outdated ./${{ env.PROJECT_PATH }}/${{ env.SOLUTION_FILE }} --upgrade --include-transitive 2>$null || true
      continue-on-error: true
      shell: pwsh
